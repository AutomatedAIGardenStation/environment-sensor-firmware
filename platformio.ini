; env_controller – PlatformIO project
; Firmware for the environment subsystem: pumps, valves, LEDs, fans, climate sensors.
; Build: pio run   Upload: pio run -t upload   Monitor: pio device monitor

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_flags = -DENV_CONTROLLER

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
build_flags = -DENV_CONTROLLER

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DENV_CONTROLLER
