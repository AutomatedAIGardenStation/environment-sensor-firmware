; env_controller – PlatformIO project
; Firmware for the environment subsystem: pumps, valves, LEDs, fans, climate sensors.
; Build: pio run   Upload: pio run -t upload   Monitor: pio device monitor

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_flags = -DENV_CONTROLLER

[env:native]
platform = native
test_framework = unity
build_flags = -I test/test_pwm_driver -DESP32 -DNATIVE_TEST
; Include src files so protocol is compiled
test_build_src = yes
; The actuators lib is in lib/actuators. We need to tell PIO to build it.
lib_deps =
    ${PROJECT_DIR}/lib/actuators

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
build_flags = -DENV_CONTROLLER

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DENV_CONTROLLER
